q<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime IELTS Academy // Lofi Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff2a6d;
            --neon-cyan: #05d9e8;
            --dark-bg: rgba(15, 15, 25, 0.85);
            --text-main: #e0e0e0;
            --success: #01ffc3;
            --danger: #ff0055;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            /* Lofi anime aesthetic background */
            background-color: #0a0a1a;
            background-image: linear-gradient(rgba(10, 10, 30, 0.6), rgba(10, 10, 30, 0.8)), url('https://images.unsplash.com/photo-1563089145-599997674d42?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main); overflow: hidden;
        }

        .game-container {
            width: 95%; max-width: 950px;
            background: var(--dark-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon-cyan); 
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(5, 217, 232, 0.3), inset 0 0 10px rgba(5, 217, 232, 0.1);
            display: flex; flex-direction: column;
            position: relative; padding: 25px;
        }

        /* --- HUD --- */
        .hud {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 2px solid rgba(5, 217, 232, 0.4);
            padding-bottom: 15px; margin-bottom: 20px;
        }

        .stats-group {
            display: flex; flex-direction: column; gap: 5px;
        }

        .level-text { font-family: 'Permanent Marker', cursive; font-size: 2rem; color: var(--neon-pink); letter-spacing: 2px; text-shadow: 2px 2px 0px #000; }
        .progress-text { font-size: 1.1rem; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
        .score-text { font-size: 1.1rem; color: var(--neon-cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}

        /* --- Inventory Box --- */
        .inventory-box {
            display: flex; gap: 10px; align-items: center;
            background: rgba(0,0,0,0.6); padding: 10px;
            border-radius: 10px; border: 1px solid var(--neon-pink);
            min-width: 250px; justify-content: flex-end;
        }
        .inventory-title { font-size: 0.9rem; color: #fff; font-weight: 900; margin-right: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .item-slot {
            width: 45px; height: 45px; border-radius: 8px;
            background: rgba(255, 255, 255, 0.05); display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .item-glow { box-shadow: 0 0 15px var(--neon-cyan); border-color: var(--neon-cyan); animation: pulse 1.5s infinite alternate; }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 10px var(--neon-cyan); }
            to { transform: scale(1.1); box-shadow: 0 0 20px var(--neon-cyan); }
        }

        /* --- Visual Novel Area --- */
        .novel-area {
            display: flex; gap: 20px; margin-bottom: 25px; align-items: flex-end;
        }
        .character-sprite {
            width: 150px; height: 150px;
            /* Cool anime avatar */
            background: url('https://api.dicebear.com/7.x/adventurer/svg?seed=Anime&backgroundColor=transparent') no-repeat bottom center;
            background-size: contain;
            filter: drop-shadow(0 0 8px var(--neon-cyan));
            transform: scaleX(-1); /* Faces the text box */
        }
        
        .dialogue-box {
            flex: 1; background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-pink); border-radius: 10px;
            padding: 20px; font-size: 1.2rem; line-height: 1.5; font-weight: 700;
            position: relative; box-shadow: 8px 8px 0px rgba(255, 42, 109, 0.2);
            color: #fff;
        }
        .dialogue-box::before {
            content: "@Sensei"; position: absolute; top: -15px; left: 15px;
            background: var(--neon-pink); padding: 2px 12px;
            font-family: 'Permanent Marker', cursive; font-size: 1rem; color: #fff;
            border-radius: 5px; box-shadow: 0 0 10px var(--neon-pink);
        }

        /* --- Input Area --- */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .btn-option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-cyan); color: #fff;
            padding: 15px; font-size: 1.2rem; font-family: 'Nunito', sans-serif; font-weight: 800;
            border-radius: 8px; cursor: pointer; transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-option:hover { 
            background: var(--neon-cyan); color: #000; 
            transform: translateX(5px) translateY(-5px); 
            box-shadow: -5px 5px 0px rgba(5, 217, 232, 0.4);
        }
        .btn-option:active { transform: translateX(0) translateY(0); box-shadow: none; }
        .btn-option:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .correct { background: var(--success) !important; color: #000 !important; border-color: var(--success) !important; box-shadow: 0 0 15px var(--success) !important; }
        .wrong { background: var(--danger) !important; color: #fff !important; border-color: var(--danger) !important; box-shadow: 0 0 15px var(--danger) !important; }

        /* Fill Blank Input */
        .fill-blank-container { grid-column: span 2; display: flex; gap: 10px; }
        .text-input { flex: 1; padding: 15px 20px; font-size: 1.2rem; border-radius: 8px; border: 2px solid var(--neon-pink); background: rgba(0,0,0,0.5); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; outline: none;}
        .text-input:focus { box-shadow: 0 0 10px var(--neon-pink); }
        .btn-submit { padding: 15px 40px; font-size: 1.2rem; background: var(--neon-pink); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-submit:hover { background: #fff; color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }

        /* --- Overlays --- */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; border-radius: 15px; text-align: center; padding: 20px;
        }
        .overlay h1 { font-family: 'Permanent Marker', cursive; font-size: 4rem; margin-bottom: 10px; color: var(--neon-cyan); text-shadow: 4px 4px 0px var(--neon-pink); transform: rotate(-2deg);}
        .overlay p { font-size: 1.3rem; max-width: 600px; margin-bottom: 30px; font-weight: 700; color: #ccc; }
        
        .btn-action {
            background: transparent; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 15px 40px;
            font-size: 1.3rem; font-family: 'Nunito', sans-serif; font-weight: 900; border-radius: 5px; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s; margin: 5px;
        }
        .btn-action:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }
        
        .btn-action-primary { background: var(--neon-pink); color: #fff; border-color: var(--neon-pink); }
        .btn-action-primary:hover { background: transparent; color: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink); }

    </style>
</head>
<body>

<div class="game-container">
    <div id="status-overlay" class="overlay">
        <h1 id="overlay-title">LOADING...</h1>
        <p id="overlay-desc">Connecting to the server...</p>
        <div id="overlay-buttons"></div>
    </div>

    <div class="hud">
        <div class="stats-group">
            <div class="level-text" id="level-display">LVL: ???</div>
            <div class="progress-text">Q: <span id="q-count">0</span> / 10 ⚡</div>
            <div class="score-text">PTS: <span id="p-score">0</span> / 8 🔥</div>
        </div>
        
        <div class="inventory-box">
            <span class="inventory-title">GEAR</span>
            <div class="item-slot" id="slot-0"></div>
            <div class="item-slot" id="slot-1"></div>
            <div class="item-slot" id="slot-2"></div>
            <div class="item-slot" id="slot-3"></div>
        </div>
    </div>

    <div class="novel-area">
        <div class="character-sprite"></div>
        <div class="dialogue-box" id="question-text">...</div>
    </div>

    <div class="options-grid" id="options-area"></div>
</div>

<script>
    // ==========================================
    // ⚠️ PASTE YOUR GOOGLE WEB APP URL HERE:
    // ==========================================
    const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZW76StbsW-Dpu9Gkyje9WTEGibO5ITdpwlLepUCNO1fKN0tKRELVAso73phSmCee32A/exec"; 

    // --- Game Logic State ---
    let allQuestions = [];
    let currentPool = [];
    let currentQ = null;
    
    // Teen/Gamer Level System
    const levels = ['advanced1', 'advanced2', 'advanced3', 'advanced4'];
    const rewards = ['🎧', '🛹', '🎮', '👑']; // Headphones, Skateboard, Controller, Crown
    const levelNames = ['Noob (Adv 1)', 'Gamer (Adv 2)', 'Pro (Adv 3)', 'Hacker (Adv 4)'];
    
    let currentLevelIndex = 0;
    
    // Round Stats
    const MAX_Q_PER_LEVEL = 10;
    const PASSING_SCORE = 8;
    let questionsAskedThisLevel = 0;
    let pointsThisLevel = 0;
    let totalOverallScore = 0;

    // --- DOM Elements ---
    const overlay = document.getElementById('status-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const overlayBtns = document.getElementById('overlay-buttons');
    
    const qText = document.getElementById('question-text');
    const optArea = document.getElementById('options-area');
    
    const displayLevel = document.getElementById('level-display');
    const displayQCount = document.getElementById('q-count');
    const displayPScore = document.getElementById('p-score');

    // 1. Fetch Data
    window.onload = async function() {
        try {
            const response = await fetch(GOOGLE_APP_SCRIPT_URL + "?action=getQuestions");
            const data = await response.json();
            allQuestions = data.filter(q => q.Question && q.Answer && q.Difficulty);
            
            if (allQuestions.length > 0) {
                showStartScreen();
            } else {
                showOverlay("ERROR 404", "Bro, there are no questions in your Google Sheet. Go add some! 💀", [], "var(--danger)");
            }
        } catch (error) {
            showOverlay("CONNECTION FAILED", "Can't reach the server. Check your Google Apps Script link! 🔌", [], "var(--danger)");
        }
    };

    function showStartScreen() {
        showOverlay("ACADEMY.EXE", "Yo! Welcome to the Academy. Answer 10 questions. Get 8 right to level up and unlock gear. You ready? 🎮", [
            { text: "START GAME", action: startGame, primary: true }
        ], "var(--neon-cyan)");
    }

    // 2. Start / Setup Level
    function startGame() {
        currentLevelIndex = 0;
        totalOverallScore = 0;
        for(let i=0; i<4; i++) {
            let slot = document.getElementById(`slot-${i}`);
            slot.innerText = ""; slot.classList.remove('item-glow');
        }
        startLevel();
    }

    function startLevel() {
        questionsAskedThisLevel = 0;
        pointsThisLevel = 0;
        
        let targetDiff = levels[currentLevelIndex].toLowerCase();
        currentPool = allQuestions.filter(q => q.Difficulty.toLowerCase() === targetDiff);
        
        if(currentPool.length < MAX_Q_PER_LEVEL) {
            while(currentPool.length < MAX_Q_PER_LEVEL) currentPool = currentPool.concat(currentPool);
        }

        updateHUD();
        overlay.style.display = 'none';
        nextQuestion();
    }

    // 3. Question Logic
    function nextQuestion() {
        if (questionsAskedThisLevel >= MAX_Q_PER_LEVEL) {
            return evaluateLevelEnd();
        }

        let rIdx = Math.floor(Math.random() * currentPool.length);
        currentQ = currentPool.splice(rIdx, 1)[0];
        questionsAskedThisLevel++;
        updateHUD();

        qText.innerHTML = `<span style="color: var(--neon-cyan);">[Q${questionsAskedThisLevel}]</span><br><br>${currentQ.Question}`;
        optArea.innerHTML = "";

        let qType = currentQ.Type ? currentQ.Type.toLowerCase().trim() : "multiple_choice";

        if (qType === "fill_blank") {
            optArea.innerHTML = `
                <div class="fill-blank-container">
                    <input type="text" id="fb-input" class="text-input" placeholder="Type answer here..." autocomplete="off">
                    <button class="btn-submit" onclick="submitFillBlank()">SEND</button>
                </div>
            `;
            document.getElementById('fb-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') submitFillBlank();
            });
            document.getElementById('fb-input').focus();
        } else {
            let opts = currentQ.Options ? currentQ.Options.split(",").map(o=>o.trim()) : [];
            opts.sort(() => Math.random() - 0.5);
            opts.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "btn-option"; btn.innerText = opt;
                btn.onclick = () => validateAnswer(btn, opt);
                optArea.appendChild(btn);
            });
        }
    }

    function submitFillBlank() {
        let input = document.getElementById('fb-input');
        let btn = document.querySelector('.btn-submit');
        input.disabled = true; btn.disabled = true;
        validateAnswer(input, input.value);
    }

    // 4. Validation
    function validateAnswer(element, userAnswer) {
        document.querySelectorAll('.btn-option').forEach(b => b.disabled = true);
        
        let correctAns = currentQ.Answer.toLowerCase().trim();
        let isCorrect = userAnswer.toLowerCase().trim() === correctAns;

        if (isCorrect) {
            pointsThisLevel++;
            totalOverallScore++;
            if(element.tagName === "BUTTON") element.classList.add("correct");
            else element.style.borderColor = "var(--success)";
            
            qText.innerHTML = `<span style="color: var(--success);">"Massive W! Let's gooo! 🔥"</span>`;
            setTimeout(nextQuestion, 1200);
        } else {
            if(element.tagName === "BUTTON") element.classList.add("wrong");
            else element.style.borderColor = "var(--danger)";
            
            document.querySelectorAll('.btn-option').forEach(b => {
                if (b.innerText.toLowerCase() === correctAns) b.classList.add("correct");
            });

            let hint = currentQ.Hint ? `<br><br>💡 Hint: ${currentQ.Hint}` : "";
            let correctAnswerMsg = currentQ.Type === "fill_blank" ? `<br>Correct Answer: <strong>${currentQ.Answer}</strong>` : "";
            
            qText.innerHTML = `<span style="color: var(--danger);">"Bruh... incorrect. 💀"</span>${correctAnswerMsg}${hint}`;
            
            // Screen shake
            document.querySelector('.game-container').animate([
                { transform: 'translateX(8px)' }, { transform: 'translateX(-8px)' },
                { transform: 'translateX(4px)' }, { transform: 'translateX(-4px)' },
                { transform: 'translateX(0)' }
            ], { duration: 300 });

            setTimeout(nextQuestion, 3500); 
        }
        updateHUD();
    }

    // 5. Level End Logic
    function evaluateLevelEnd() {
        if (pointsThisLevel >= PASSING_SCORE) {
            awardItem(currentLevelIndex);
            
            if (currentLevelIndex >= levels.length - 1) {
                showOverlay("GG! YOU WIN 🏆", 
                    `Absolute legend. You beat the whole game!<br>Total Points: ${totalOverallScore}`, 
                    [{ text: "PLAY AGAIN", action: startGame, primary: true }], "gold"
                );
            } else {
                currentLevelIndex++;
                showOverlay("LEVEL CLEARED ⚡", 
                    `W! You got ${pointsThisLevel} points and unlocked new gear.<br>Ready for ${levelNames[currentLevelIndex]}?`, 
                    [{ text: "NEXT LEVEL", action: startLevel, primary: true }], "var(--success)"
                );
            }
        } else {
            showOverlay("BIG L 💀", 
                `Oof. You only got ${pointsThisLevel} points. You need 8 to pass.<br>Lock in and try again!`, 
                [{ text: "RETRY LEVEL", action: startLevel, primary: false }], "var(--danger)"
            );
        }
    }

    function awardItem(level) {
        let slot = document.getElementById(`slot-${level}`);
        slot.innerText = rewards[level];
        slot.classList.add('item-glow');
    }

    // 6. Utility Functions
    function updateHUD() {
        displayLevel.innerText = `${levelNames[currentLevelIndex]}`;
        displayQCount.innerText = questionsAskedThisLevel;
        displayPScore.innerText = pointsThisLevel;
        displayPScore.style.color = (pointsThisLevel >= PASSING_SCORE) ? "var(--success)" : "var(--neon-cyan)";
    }

    function showOverlay(title, desc, buttonsConfig, titleColor) {
        overlay.style.display = 'flex';
        overlayTitle.innerText = title;
        overlayTitle.style.color = titleColor;
        overlayDesc.innerHTML = desc;
        
        overlayBtns.innerHTML = "";
        buttonsConfig.forEach(cfg => {
            let b = document.createElement("button");
            b.innerText = cfg.text;
            b.className = cfg.primary ? "btn-action btn-action-primary" : "btn-action";
            b.onclick = cfg.action;
            overlayBtns.appendChild(b);
        });
    }

</script>
</body>
</html>
